  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
        USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;

        -- NOTE: The session variable I_CONTROL_PACKAGE_DATE_ID must be set by the orchestration tool before this script is run.
        -- Example in Snowflake: SET I_CONTROL_PACKAGE_DATE_ID = 1;
        UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_DATE
        SET
          PROCESSED_FLAG = 1,
          RECORDS_PROCESSED = (
            SELECT
              SUM(INSERTED_RECORD_COUNT)
            FROM
              ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_DATE_SOURCE_TABLE
            WHERE
              ACA_CONTROL_PACKAGE_DATE_ID = $I_CONTROL_PACKAGE_DATE_ID
          ),
          ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          ACA_UPDATE_USER = 'DBO.SPACA_ACA_CONTROL_PACKAGE_DATE_UPDATE'
        WHERE
          ACA_CONTROL_PACKAGE_DATE_ID = $I_CONTROL_PACKAGE_DATE_ID;
      END;
    testsEnabled: true
    truncateBefore: false
