  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
      MERGE INTO ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS AS TGT
      USING (
        SELECT
          p.ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS_SK, -- NOTE: This is an assumed surrogate key for the join condition. Please verify the actual primary key of the table.
          ty.ACA_PAYMENT_TYPE_CODE_ESIS_ID,
          pt.ACA_PAY_TO_CODE_ID,
          mt.ACA_MAIL_TO_CODE_ID,
          cs.ACA_CHECK_STOCK_TYPE_ID,
          ty.PAYMENT_TYPE,
          pt.PAY_TO,
          mt.MAIL_TO,
          cs.CHECK_STOCK_TYPE,
          s.ACA_SOURCE_SYSTEM_ID
        FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS AS p
        LEFT JOIN (
          SELECT
            PAYMENT_TYPE_CODE,
            MAX(ACA_PAYMENT_TYPE_CODE_ESIS_ID) AS ACA_PAYMENT_TYPE_CODE_ESIS_ID
          FROM ALLIANT_CLAIMS_ASTRUS.REF.ACA_PAYMENT_TYPE_CODE_ESIS
          GROUP BY
            PAYMENT_TYPE_CODE
        ) AS tym
          ON tym.PAYMENT_TYPE_CODE = p.PAYMENT_TYPE_CODE
        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_PAYMENT_TYPE_CODE_ESIS AS ty
          ON ty.ACA_PAYMENT_TYPE_CODE_ESIS_ID = tym.ACA_PAYMENT_TYPE_CODE_ESIS_ID
        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_PAY_TO_CODE AS pt
          ON pt.PAY_TO_CODE = p.PAY_TO_CODE
        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_MAIL_TO_CODE AS mt
          ON mt.MAIL_TO_CODE = p.MAIL_TO_CODE
        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_CHECK_STOCK_TYPE AS cs
          ON cs.CHECK_STOCK_TYPE_CODE = p.CHECK_STOCK_TYPE_CODE
        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM AS s
          ON s.SOURCE_SYSTEM = p.SOURCE_SYSTEM
      ) AS SRC
        ON TGT.ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS_SK = SRC.ACA_PAYMENT_ATTRIBUTE_STAGING_ESIS_SK
      WHEN MATCHED
      THEN
      UPDATE SET
        ACA_PAYMENT_TYPE_CODE_ID = SRC.ACA_PAYMENT_TYPE_CODE_ESIS_ID,
        ACA_PAY_TO_CODE_ID = SRC.ACA_PAY_TO_CODE_ID,
        ACA_MAIL_TO_CODE_ID = SRC.ACA_MAIL_TO_CODE_ID,
        ACA_CHECK_STOCK_TYPE_ID = SRC.ACA_CHECK_STOCK_TYPE_ID,
        PAYMENT_TYPE = SRC.PAYMENT_TYPE,
        PAY_TO = SRC.PAY_TO,
        MAIL_TO = SRC.MAIL_TO,
        CHECK_STOCK_TYPE = SRC.CHECK_STOCK_TYPE,
        ACA_SOURCE_SYSTEM_ID = SRC.ACA_SOURCE_SYSTEM_ID,
        ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
        ACA_UPDATE_USER = 'dbo.spaca_aca_payment_attribute_staging_esis_update';
      END
    testsEnabled: true
    truncateBefore: false
