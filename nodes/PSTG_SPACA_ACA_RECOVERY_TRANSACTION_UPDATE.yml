operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS;

      UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_RECOVERY_TRANSACTION AS P
      SET P.ACA_CLAIM_ID = SOURCE.NEW_ACA_CLAIM_ID,
          P.ACA_DATE_UPDATED = SOURCE.NEW_ACA_DATE_UPDATED,
          P.ACA_UPDATE_USER = SOURCE.NEW_ACA_UPDATE_USER
      FROM (
          SELECT 
              P.SOURCE_SYSTEM_CLAIM_ID AS JOIN_KEY,
              C.ACA_CLAIM_ID AS NEW_ACA_CLAIM_ID,
              CURRENT_TIMESTAMP() AS NEW_ACA_DATE_UPDATED,
              'SPACA_ACA_RECOVERY_TRANSACTION_UPDATE' AS NEW_ACA_UPDATE_USER
          FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_RECOVERY_TRANSACTION AS P
          INNER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS C
              ON C.SOURCE_SYSTEM_CLAIM_ID = P.SOURCE_SYSTEM_CLAIM_ID
          WHERE P.ACA_CLAIM_ID = -1
            AND P.SOURCE_SYSTEM_CLAIM_ID IS NOT NULL
      ) AS SOURCE
      WHERE P.SOURCE_SYSTEM_CLAIM_ID = SOURCE.JOIN_KEY
        AND P.ACA_CLAIM_ID = -1
        AND P.SOURCE_SYSTEM_CLAIM_ID IS NOT NULL;
      END;
    testsEnabled: true
    truncateBefore: false
