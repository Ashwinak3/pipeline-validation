  name: PSTG_SPAO_AO_RESPONSE_FEED_STAGING_UPDATE
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\nUSE DATABASE ALLIANT_ONE;\nUPDATE ALLIANT_ONE.STG.AO_RESPONSE_FEED_STAGING\
      \ AS TGT\nSET\n    TGT.dw_client_id = SOURCE.new_dw_client_id,\n    TGT.dw_policy_id\
      \ = SOURCE.new_dw_policy_id,\n    TGT.sf_account_owner_id = SOURCE.new_sf_account_owner_id\n\
      FROM (\n    SELECT\n        s.DW_AO_RESPONSE_FEED_STAGING_ID, -- Assumed Primary\
      \ Key for the target table\n        COALESCE(cc.dw_client_id, -1) AS new_dw_client_id,\n\
      \        COALESCE(pc.dw_policy_id, -1) AS new_dw_policy_id,\n        sa.OwnerId\
      \ AS new_sf_account_owner_id\n    FROM ALLIANT_ONE.STG.AO_RESPONSE_FEED_STAGING\
      \ AS s\n    LEFT JOIN ALLIANT_DW.DBO.DW_POLICY_CURRENT AS pc\n        ON TRY_CAST(s.Epic_UniqPolicy\
      \ AS VARCHAR(50)) = pc.source_system_policy_id\n        AND pc.source_system\
      \ = 'EPIC'\n    LEFT JOIN ALLIANT_DW.DBO.DW_CLIENT_CURRENT AS cc\n        ON\
      \ s.Epic_Client_Lookup_Code = cc.lookup_code\n    LEFT JOIN ALLIANT_DW.REF.SALESFORCE_ACCOUNT\
      \ AS sa\n        ON s.SFAcctID = sa.Id\n) AS SOURCE\nWHERE TGT.DW_AO_RESPONSE_FEED_STAGING_ID\
      \ = SOURCE.DW_AO_RESPONSE_FEED_STAGING_ID;\nEND;"
    testsEnabled: true
    truncateBefore: false
