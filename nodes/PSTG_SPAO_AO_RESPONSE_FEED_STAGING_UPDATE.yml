  name: PSTG_SPAO_AO_RESPONSE_FEED_STAGING_UPDATE
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\nUPDATE ALLIANT_ONE.STG.AO_RESPONSE_FEED_STAGING AS S\nSET\n  S.DW_CLIENT_ID\
      \ = SRC.NEW_DW_CLIENT_ID,\n  S.DW_POLICY_ID = SRC.NEW_DW_POLICY_ID,\n  S.SF_ACCOUNT_OWNER_ID\
      \ = SRC.NEW_SF_ACCOUNT_OWNER_ID\nFROM (\n  SELECT\n    S_INNER.EPIC_UNIQPOLICY,\n\
      \    S_INNER.EPIC_CLIENT_LOOKUP_CODE,\n    S_INNER.SFACCTID,\n    COALESCE(CC.DW_CLIENT_ID,\
      \ -1) AS NEW_DW_CLIENT_ID,\n    COALESCE(PC.DW_POLICY_ID, -1) AS NEW_DW_POLICY_ID,\n\
      \    SA.OWNERID AS NEW_SF_ACCOUNT_OWNER_ID\n  FROM ALLIANT_ONE.STG.AO_RESPONSE_FEED_STAGING\
      \ AS S_INNER\n  LEFT JOIN ALLIANT_DW.DBO.DW_POLICY_CURRENT AS PC\n    ON TRY_CAST(S_INNER.EPIC_UNIQPOLICY\
      \ AS VARCHAR(50)) = PC.SOURCE_SYSTEM_POLICY_ID\n    AND PC.SOURCE_SYSTEM = 'EPIC'\n\
      \  LEFT JOIN ALLIANT_DW.DBO.DW_CLIENT_CURRENT AS CC\n    ON S_INNER.EPIC_CLIENT_LOOKUP_CODE\
      \ = CC.LOOKUP_CODE\n  LEFT JOIN ALLIANT_DW.REF.SALESFORCE_ACCOUNT AS SA\n  \
      \  ON S_INNER.SFACCTID = SA.ID\n) AS SRC\nWHERE\n  COALESCE(S.SFACCTID, 'sf_default_string')\
      \ = COALESCE(SRC.SFACCTID, 'sf_default_string')\n  AND COALESCE(S.EPIC_CLIENT_LOOKUP_CODE,\
      \ 'sf_default_string') = COALESCE(SRC.EPIC_CLIENT_LOOKUP_CODE, 'sf_default_string')\n\
      \  AND COALESCE(TRY_CAST(S.EPIC_UNIQPOLICY AS VARCHAR(50)), 'sf_default_string')\
      \ = COALESCE(SRC.EPIC_UNIQPOLICY, 'sf_default_string');\nEND;"
