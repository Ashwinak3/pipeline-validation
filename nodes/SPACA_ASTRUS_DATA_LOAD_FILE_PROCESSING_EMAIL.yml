  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n  -- Parameters from the original stored procedure signature,\
      \ using sample call values\n  LET MACHINE VARCHAR(100) := 'DEV-SQLV16-01';\n\
      \  LET FROM_RECIPIENT VARCHAR(100) := 'ssis@alliant';\n  LET TO_RECIPIENT VARCHAR(100)\
      \ := 'venkata.rajula@alliant.com';\n  LET COPY_RECIPIENT VARCHAR(100) := NULL;\n\
      \n  LET TABLEHTML_ASTRUS VARCHAR;\n  LET SUBJECT VARCHAR(500);\n  LET CURRENT_DATE_VAR\
      \ DATE := CAST(CURRENT_TIMESTAMP() AS DATE);\n  LET RECORDS_FOUND BOOLEAN :=\
      \ FALSE;\n\n  SELECT EXISTS (\n      SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_PYRAMID_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE) = :CURRENT_DATE_VAR\n\
      \      UNION ALL\n      SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_TRANSACTION_CLAIM_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE) =\
      \ :CURRENT_DATE_VAR\n      UNION ALL\n      SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_TRANSACTION_EXCESS_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE)\
      \ = :CURRENT_DATE_VAR\n      UNION ALL\n      SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_TRANSACTION_EXPERIENCE_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE)\
      \ = :CURRENT_DATE_VAR\n      UNION ALL\n      SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_TRANSACTION_HEADER_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE)\
      \ = :CURRENT_DATE_VAR\n      UNION ALL\n      SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_TRANSACTION_PAYMENT_STAGING') }} WHERE CAST(ACA_DATE_CREATED AS DATE)\
      \ = :CURRENT_DATE_VAR\n      UNION ALL\n      SELECT 1 FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_TRANSACTION_THIRD_PARTY_RECOVERY_STAGING') }} WHERE CAST(ACA_DATE_CREATED\
      \ AS DATE) = :CURRENT_DATE_VAR\n  ) INTO :RECORDS_FOUND;\n\n  IF (NOT :RECORDS_FOUND)\
      \ THEN\n      TABLEHTML_ASTRUS := '<html><body>' ||\n                      \
      \ '<h1>No Astrus(GB) Files for ASG Load Processing ' || TO_VARCHAR(:CURRENT_DATE_VAR)\
      \ || '</h1>' ||\n                       '</body></html>';\n  END IF;\n\n  IF\
      \ (TABLEHTML_ASTRUS IS NOT NULL) THEN\n      SUBJECT := :MACHINE || ': Astrus\
      \ ASG Load Processing';\n\n      LET FULL_RECIPIENTS VARCHAR := :TO_RECIPIENT;\n\
      \      IF (:COPY_RECIPIENT IS NOT NULL) THEN\n          FULL_RECIPIENTS := FULL_RECIPIENTS\
      \ || ',' || :COPY_RECIPIENT;\n      END IF;\n\n      -- NOTE: The msdb.dbo.sp_send_dbmail\
      \ procedure needs to be replaced with a\n      --       Snowflake equivalent,\
      \ such as a call to SYSTEM$SEND_EMAIL.\n      --       This requires an email\
      \ notification integration to be configured in Snowflake.\n      --       Example:\
      \ CALL SYSTEM$SEND_EMAIL('your_integration_name', :FULL_RECIPIENTS, :SUBJECT,\
      \ :TABLEHTML_ASTRUS, 'HTML');\n\n  END IF;\nEND;"
