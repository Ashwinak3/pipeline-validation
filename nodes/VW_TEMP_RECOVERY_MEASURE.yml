            FROM {{ ref('DBSHIFT', 'ACA_TRANSACTION_THIRD_PARTY_RECOVERY') }} P,
            LATERAL FLATTEN(INPUT => ARRAY_CONSTRUCT(
              OBJECT_CONSTRUCT('name', 'recovery_amount1', 'value', P.RECOVERY_AMOUNT1),
              OBJECT_CONSTRUCT('name', 'recovery_amount2', 'value', P.RECOVERY_AMOUNT2),
