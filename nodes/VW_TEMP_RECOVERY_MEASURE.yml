              OBJECT_CONSTRUCT('name', 'recovery_amount6', 'value', P.RECOVERY_AMOUNT6)
            )) U
            WHERE P.ACA_DATE_UPDATED > (SELECT IFNULL(MAX(T.ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ) FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_RECOVERY_TRANSACTION T WHERE T.ACA_SOURCE_SYSTEM_ID = (SELECT S.ACA_SOURCE_SYSTEM_ID FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM S WHERE S.SOURCE_SYSTEM = 'GB'))
            AND U.VALUE['value']::NUMERIC <> 0
